name: PR Check ✔

on:
  workflow_dispatch:
  pull_request:
    branches: [ master ]

jobs:

  build-and-test:
    name: ⚒🧪 Build and Test the code
    runs-on: ubuntu-latest

    steps:
    - name: ⤵ Checkout the code
      uses: actions/checkout@v3

    - name: 💾 Install dotnet
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.101'

    - name: 🧹 Dotnet Clean
      run: dotnet clean --configuration Debug && dotnet nuget locals all --clear

    - name: 🎨 Dotnet Restore
      run: dotnet restore

    - name: ⚒ Dotnet Build
      run: dotnet build --no-restore --configuration Debug

    - name: 🧪 Dotnet Test
      run: dotnet test

  publish-docker-images:
    name: 📢 Publish Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      packages: write
    strategy:
      matrix:
          dockerfile: ['Dockerfile.console', 'Dockerfile.api', 'Dockerfile.webui']
          include:
              - dockerfile: 'Dockerfile.console'
                tag: 'pr-validator-console-A'
              - dockerfile: 'Dockerfile.api'
                tag: 'pr-validator-api-A'
              - dockerfile: 'Dockerfile.webui'
                tag: 'pr-validator-webui-A'

    steps:

    - name: ⤵ Checkout the code
      uses: actions/checkout@v3

    - name: 📢 Publish Docker Images
      uses: ./.github/actions/publish-docker-images
      with:
        dockerfile: ${{ matrix.dockerfile }}
        tag: ${{ matrix.tag }}
        github_token: ${{ secrets.GITHUB_TOKEN }}
