# sudo groupadd -g 1015 p2g
# sudo usermod -aG p2g <yourUser>

services:
  p2g-api:
    container_name: p2g-api
    image: ghcr.io/frizat82/peloton-to-garmin:api-stable
    user: :p2g
    environment:
      - TZ=America/Chicago
      - P2G_CONFIG_DIRECTORY=/app/config
    # ports:
    #   - 8001:8080 # optional, only if you plan to interact with the API directly
    volumes:
      - ./config/api/:/app/config
      - ./data:/app/data # recommended for saving settings across restarts
      - ./output:/app/output # optional, if you want access to the generated workout and log files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  p2g-webui:
    container_name: p2g-webui
    image: ghcr.io/frizat82/peloton-to-garmin:webui-stable
    user: :p2g
    ports:
      - 8002:8080
    environment:
      - TZ=America/Chicago
      - P2G_CONFIG_DIRECTORY=/app/config
      - P2G_Api__HostUrl=http://p2g-api:8080
    volumes:
      - ./config/webui:/app/config
    depends_on:
      p2g-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
